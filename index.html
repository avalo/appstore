<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Amazon Appstore</title>
    <link rel="stylesheet" type="text/css" media="screen" href="css/bootstrap.min.css"/>
    <link rel="stylesheet" href="css/all.css"><!--FontAwesome-->
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark fixed-top bg-custom">
        <a class="navbar-brand">
            <img src="img/logo.png">
        </a>
        <form class="form-inline ml-auto">
          <input class="form-control mr-sm-2 border-warning" type="search" placeholder="Search" aria-label="Search">
          <button class="btn btn-warning my-2 my-sm-0" type="button">
            <i class="fas fa-search"></i>
          </button>
        </form>
    </nav> 
    
    <div class="container my-5">

        <!-- Seleciconar aplicacion INICIO-->
        <div class="row">
            <div class="col-12 align-content-start">
                <button type="button" class="btn btn-outline-warning my-2 my-sm-0 btn-lg btn-block" onclick="nuevaAplicacion();" data-toggle="modal" data-target="#modal-nueva-app" style="font-size: 1.30rem;">Nueva App <i class="fas fa-plus"></i></button>
            </div>
        </div>
        <!-- Seleciconar aplicacion FIN-->

        <!-- Seleciconar categoria-->
        <div class="row">
            <div class="col-12 my-4">
                <select id="categoria" onchange="seleccionarCategoria();" class="form-control" style="font-size: 1.9rem;">
                    <option value="">-- Seleccione una categoria --</option>
                </select>
            </div>
        </div>
        <!-- Seleciconar categoria FIN-->

        <!--Contenido Aplicaciones INICIO-->
        <div class="row" id="aplicacionesC">
        </div>
        <!--Contenido Aplicaciones FIN-->

        <!--Detalle Modal-->
        <div class="modal fade" id="modal-detalle" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog" role="document">
                <div class="modal-content">
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-4">
                                <img id="appimagen" class="img-fluid">
                            </div>
                            <div class="col-8">
                                <h2 id="appnombre"></h2>
                                <div class="texto-desarrollador" id="appdesarollador"></div>
                                <div id="appdescripcion"></div>
                            </div>
                        </div>
                        <hr>
                        <div id="appestrellas" class="text-center">
                        </div>

                        <!--Carrusel-->
                        <div id="carouselExampleControls" class="carousel slide" data-ride="carousel">
                            <div class="carousel-inner">
                                <div class="carousel-item active">
                                    <img src="img/app-screenshots/1.webp" class="d-block w-100" alt="...">
                                </div>
                                <div class="carousel-item">
                                    <img src="img/app-screenshots/2.webp" class="d-block w-100" alt="...">
                                </div>
                                <div class="carousel-item">
                                    <img src="img/app-screenshots/3.webp" class="d-block w-100" alt="...">
                                </div>
                            </div>
                            <a class="carousel-control-prev" href="#carouselExampleControls" role="button" data-slide="prev">
                                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                                <span class="sr-only">Previous</span>
                            </a>
                            <a class="carousel-control-next" href="#carouselExampleControls" role="button" data-slide="next">
                                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                                <span class="sr-only">Next</span>
                            </a>
                        </div>
                        <!--Carrusel FIN-->

                        <!--COMENTARIO INCIO-->
                        <div class="row comentario">
                            <div class="col-2">
                                <img src="img/user.webp" class="rounded-circle">
                            </div>
                            <div class="col-10">
                                <b>Usuario 1</b>
                                <p class="text-muted">Lorem ipsum dolor sit amet consectetur, adipisicing elit. Officiis repellendus quidem quod molestiae ipsum accusamus architecto non sed delectus fuga.</p>
                            </div>
                        </div>
                        <!--COMENTARIO FINAL-->

                        <!--Formulario nuevo comentario INCIO-->
                        <div class="row">
                            <div class="col-10">
                                <input class="form-control" type="text" id="nuevoComentario" placeholder="Nuevo comentario">
                            </div>
                            <div class="col-2">
                                <button type="button" class="btn btn-outline-warning"><i class="fa fa-paper-plane"></i></button>
                            </div>
                        </div>
                        <!-- nuevo comentario FINAL--> 
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-dark" data-dismiss="modal">Cerrar</button>
                        <button type="button" class="btn btn-outline-warning" data-dismiss="modal">Instalar</button>
                    </div>
                </div>
            </div>
        </div>

        <!--Nueva App Modal-->
        <div class="modal fade" id="modal-nueva-app" tabindex="-1" role="dialog" aria-hidden="true">
            <div class="modal-dialog" role="document">
                <div class="modal-content">
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-4">
                                <img id="appImagen" class="img-fluid">
                            </div>
                            <div class="col-8">
                                <form id="form-app">
                                    Icono: <select onchange=" mostrarImagen();" class="form-control" name="icono" id="icono"></select>
                                    <input class="form-control" type="text" name="nombre" id="nombre" placeholder="Nombre aplicación">
                                    <textarea class="form-control" type="text" name="descripcion" id="descripcion" placeholder="Descripción"></textarea>
                                    <input class="form-control" type="text" name="desarrollador" id="desarrollador" placeholder="Desarrollador">
                                    <input class="form-control" type="text" name="descargas" id="descargas" placeholder="Descargas">
                                    <input class="form-control" type="number" max="5" min="1" name="calificacion" id="calificacion" placeholder="Calificacion">
                                </form>
                            </div>
                        </div>
                        <div id="appestrellas" class="text-center">
                        </div>
                    </div>
                    <div class="modal-footer" id="footmodal">
                    </div>
                </div>
            </div>
        </div>
        <!--Nueva App Modal FIN-->

    </div> 

    <script src="js/jquery-3.4.1.min.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/controlador.js"></script>
</body>
</html>
